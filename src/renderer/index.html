<!DOCTYPE html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="UTF-8" />
    <!--
      Dev (Vite) needs ws: for HMR and an inline preamble script.
      Build output uses external, same-origin module scripts only.
      TODO(security): drop 'unsafe-inline' from script-src once dev is split from prod CSP.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: blob:; media-src 'self' file: data: blob:; font-src 'self' data:; connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keeper</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
